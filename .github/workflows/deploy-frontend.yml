name: Deploy Hazcentro Frontend

on:
  push:
    branches:
      - main
      - prod

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e
            echo "=== Starting deployment for ${{ github.ref_name }} ==="

            if [[ "${{ github.ref_name }}" == "main" ]]; then
              echo "🚀 Deploying to DEV environment"
              DEPLOY_PATH="${{ secrets.DEV_PATH }}"
              BRANCH="main"

            elif [[ "${{ github.ref_name }}" == "prod" ]]; then
              echo "🚀 Deploying to PROD environment"
              DEPLOY_PATH="${{ secrets.PROD_PATH }}"
              BRANCH="prod"

            else
              echo "❌ Unknown branch"
              exit 1
            fi

            cd "$DEPLOY_PATH"

            echo "Current directory: $(pwd)"
            echo "Current branch before update: $(git branch --show-current)"

            # Force clean update
            git fetch origin
            git checkout "$BRANCH"
            git reset --hard "origin/$BRANCH"
            git clean -fd   # Remove any untracked files

            echo "Updated to commit: $(git rev-parse --short HEAD)"

            # Install dependencies and build
            echo "Running npm ci..."
            npm ci

            echo "Running build..."
            npm run build

            echo "✅ Deployment completed successfully for $BRANCH"
            echo "Build folder size: $(du -sh build/ 2>/dev/null || echo 'build/ not found')"