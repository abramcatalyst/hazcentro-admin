name: Deploy Hazcentro Frontend - Catalyst 2026

on:
  push:
    branches:
      - main
      - prod

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e

            echo "=== Starting deployment for ${{ github.ref_name }} ==="

            # === LOAD NVM (Very Important for non-interactive SSH) ===
            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"  # This loads nvm
            [ -s "$NVM_DIR/bash_completion" ] && \. "$NVM_DIR/bash_completion"

            echo "Node version: $(node --version)"
            echo "npm version: $(npm --version)"

            if [[ "${{ github.ref_name }}" == "main" ]]; then
              echo "🚀 Deploying to DEV environment"
              DEPLOY_PATH="${{ secrets.DEV_PATH }}"
              BRANCH="main"

            elif [[ "${{ github.ref_name }}" == "prod" ]]; then
              echo "🚀 Deploying to PROD environment"
              DEPLOY_PATH="${{ secrets.PROD_PATH }}"
              BRANCH="prod"

            else
              echo "❌ Unknown branch"
              exit 1
            fi

            cd "$DEPLOY_PATH"

            echo "Current directory: $(pwd)"
            echo "Git branch before: $(git branch --show-current)"

            # Force update code from GitHub
            git fetch origin
            git checkout "$BRANCH"
            git reset --hard "origin/$BRANCH"
            git clean -fd

            echo "Updated to commit: $(git rev-parse --short HEAD)"

            # Build the React app
            echo "Running npm ci..."
            npm ci

            echo "Running npm run build..."
            npm run build

            echo "✅ Deployment completed successfully for ${{ github.ref_name }}"
            echo "Build folder size: $(du -sh build/ 2>/dev/null || echo 'build/ not found')"

            # Optional: Restart Nginx if you're using it
            # sudo systemctl restart nginx