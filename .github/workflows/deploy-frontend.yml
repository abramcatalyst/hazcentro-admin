name: Deploy Hazcentro Frontend -  Catalyst 2026

on:
  push:
    branches:
      - main
      - prod

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e

            echo "=== Starting deployment for ${{ github.ref_name }} ==="

            # Load NVM
            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"

            echo "Node: $(node --version) | npm: $(npm --version)"

            if [[ "${{ github.ref_name }}" == "main" ]]; then
              echo "🚀 Deploying DEV (dashboard-dev)"
              DEPLOY_PATH="${{ secrets.DEV_PATH }}"
              BRANCH="main"
              BUILD_CMD="npm run build:staging"
            elif [[ "${{ github.ref_name }}" == "prod" ]]; then
              echo "🚀 Deploying PROD (dashboard)"
              DEPLOY_PATH="${{ secrets.PROD_PATH }}"
              BRANCH="prod"
              BUILD_CMD="npm run build:production"
            else
              echo "❌ Unknown branch"
              exit 1
            fi

            cd "$DEPLOY_PATH"
            echo "📂 Working in: $(pwd)"

            # Fix ownership WITHOUT sudo (run as current user)
            echo "Fixing ownership..."
            chown -R $USER:$USER .

            # Update code and build
            git fetch origin
            git checkout "$BRANCH"
            git reset --hard "origin/$BRANCH"
            git clean -fd

            echo "✅ Updated to commit: $(git rev-parse --short HEAD)"

            npm ci
            $BUILD_CMD

            echo "✅ Build completed - dist/ folder ready"
            echo "dist size: $(du -sh dist/)"